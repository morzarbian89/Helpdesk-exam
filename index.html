<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>מבחן Helpdesk</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,"Segoe UI",sans-serif;background:#eef3f8;color:#172033}.app{width:min(940px,94vw);margin:35px auto}.card{background:white;border:1px solid #dbe3ef;border-radius:24px;padding:30px;box-shadow:0 20px 50px rgba(21,101,192,.12)}.hidden{display:none!important}.brand{display:flex;gap:18px;align-items:center;margin-bottom:22px}.logo{width:70px;height:70px;border-radius:18px;background:#1565c0;color:white;display:grid;place-items:center;font-weight:900;font-size:28px}h1,h2,p{margin-top:0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}label{display:grid;gap:7px;font-weight:700;color:#64748b}input,select{border:1px solid #dbe3ef;border-radius:14px;padding:13px 15px;font-size:17px}.info{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0}.info div{background:#f8fbff;border:1px solid #dbe3ef;border-radius:16px;padding:16px}.info strong{display:block;font-size:22px}button{border:0;border-radius:14px;padding:14px 22px;font-size:17px;cursor:pointer;font-weight:800}.primary{background:#1565c0;color:white}.secondary{background:#edf3fb;color:#0d47a1}.exam-header{display:flex;justify-content:space-between;gap:20px}.timer{direction:ltr;font-size:28px;font-weight:900;color:#0d47a1;background:#edf3fb;padding:8px 14px;border-radius:14px}.danger{color:#c62828;background:#fff2f2}.muted{color:#64748b;font-weight:700}.progress{height:10px;background:#e8eef7;border-radius:999px;overflow:hidden;margin:20px 0 28px}#progressBar{height:100%;background:#1565c0;width:0}.question{font-size:24px;line-height:1.55;font-weight:900}.answers{display:grid;gap:12px}.answer{width:100%;display:flex;gap:12px;align-items:center;border:1px solid #dbe3ef;padding:16px;border-radius:16px;background:white;text-align:right;color:#172033}.answer.selected{border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,.12)}.dot{width:20px;height:20px;border:2px solid #dbe3ef;border-radius:50%;flex:0 0 20px}.selected .dot{background:#1565c0;border-color:#1565c0;box-shadow:inset 0 0 0 5px white}.nav{display:flex;justify-content:flex-end;margin-top:25px}#loadMsg{color:#64748b;font-weight:700;margin-top:12px}@media(max-width:700px){.grid,.info{grid-template-columns:1fr}.card{padding:20px}.exam-header{display:block}}
</style></head><body><main class="app">
<section id="startScreen" class="card"><div class="brand"><div class="logo">IT</div><div><h1>מבחן מקצועי - Helpdesk</h1><p class="muted">דקה אחת לכל שאלה. אין חזרה לשאלה קודמת.</p></div></div>
<div class="grid"><label>שם מלא<input id="candidateName" required></label><label>טלפון<input id="phone"></label><label>מייל<input id="email" type="email"></label><label>משרה<select id="position"><option>Helpdesk</option><option>System</option><option>NOC</option></select></label></div>
<div class="info"><div><strong id="questionCountDisplay">25</strong><span>שאלות</span></div><div><strong>60 שניות</strong><span>לכל שאלה</span></div><div><strong id="timeLimitDisplay">25 דקות</strong><span>סה״כ משוער</span></div></div>
<button id="startBtn" class="primary" type="button">התחל מבחן</button><div id="loadMsg">טוען שאלות...</div></section>
<section id="examScreen" class="card hidden"><header class="exam-header"><div><h2 id="questionTitle"></h2><p id="category" class="muted"></p></div><div><div class="timer" id="timer">01:00</div><div class="muted" id="counter"></div></div></header><div class="progress"><div id="progressBar"></div></div><p id="questionText" class="question"></p><div id="answers" class="answers"></div><footer class="nav"><button id="nextBtn" class="primary" type="button">הבא</button></footer></section>
<section id="resultScreen" class="card hidden"><h2>המבחן הוגש בהצלחה</h2><p id="resultName"></p><p class="muted">התוצאות נשלחו לבוחן. הציון אינו מוצג לנבחן.</p><p id="submitStatus">שולח תוצאות...</p></section>
</main><script>
(function(){'use strict';
var APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbyv54MExVYvFDwgyf2nXbyAisDNLT1XPI-pzHAy1Aw_-RL8LOg0qQpcmzhIpe_3UHYnxQ/exec';
var fallbackQuestions=[{"category": "חומרה", "difficulty": "קל", "text": "מהי המטרה של זיכרון RAM במחשב?", "answers": ["אחסון קבוע של קבצים גם כשהמחשב כבוי", "אחסון זמני ומהיר של מידע בזמן עבודה", "שמירת הגדרות BIOS בלבד", "החלפת המעבד בזמן עומס"], "correct": 2}, {"category": "חומרה", "difficulty": "קל", "text": "איזה רכיב אחראי על תהליך האתחול הראשוני לפני עליית מערכת ההפעלה?", "answers": ["RAM", "ROM / BIOS", "Diskette", "Hard disk"], "correct": 2}, {"category": "חומרה", "difficulty": "קל", "text": "מה משפיע לרוב בצורה המשמעותית ביותר על מהירות העיבוד של המחשב?", "answers": ["נפח דיסק פנוי", "ספק כוח 400W", "מהירות המעבד CPU", "מהירות CD/DVD"], "correct": 3}, {"category": "חומרה", "difficulty": "בינוני", "text": "מהם שני חיבורי המדפסות הנפוצים ביותר מהרשימה?", "answers": ["Serial Port ו-RJ11", "PS/2 ו-RJ11", "LPT Port ו-USB", "PS/2 ו-USB"], "correct": 3}, {"category": "חומרה", "difficulty": "קל", "text": "באיזו פקודה תשתמש לבדיקת תקינות דיסק קשיח?", "answers": ["sfc /scannow", "CHKDSK /F", "fdisk", "loadfix C:\\MOUSE\\MOUSE.COM"], "correct": 2}, {"category": "רשתות", "difficulty": "קל", "text": "מהי כתובת IP ומה תפקידה?", "answers": ["מזהה ייחודי של מחשב או התקן ברשת", "כתובת דואר אלקטרוני של המשתמש", "שם מערכת ההפעלה בלבד", "סוג של כבל רשת"], "correct": 1}, {"category": "רשתות", "difficulty": "קל", "text": "מהו DNS?", "answers": ["שירות שמצפין אתרים", "שירות שממיר שמות דומיין לכתובות IP", "שרת שמחלק כתובות IP אוטומטית", "שירות גיבוי קבצים"], "correct": 2}, {"category": "רשתות", "difficulty": "קל", "text": "על מה אחראי DHCP?", "answers": ["הצפנת גלישה באינטרנט", "חלוקת כתובות IP בצורה אוטומטית למכשירים ברשת", "אחסון קבצים משותפים", "ניהול הרשאות ליומן Outlook"], "correct": 2}, {"category": "רשתות", "difficulty": "בינוני", "text": "PING לשם השרת לא עונה, אבל PING לכתובת ה-IP של השרת כן עונה. מה סביר שהבעיה?", "answers": ["כבל רשת תקול", "בעיית DNS", "חוסר מקום בדיסק", "סוללת BIOS חלשה"], "correct": 2}, {"category": "אופיס", "difficulty": "קל", "text": "ב-Word, איך ניתן לעצב את כל הכותרות בפורמט אחיד?", "answers": ["לעצב כל כותרת ידנית", "להשתמש בסגנונות (Styles)", "להוסיף מספור בכל פסקה", "להשתמש בתפריט הדפסה"], "correct": 2}, {"category": "אופיס", "difficulty": "קל", "text": "ב-Excel, איך ניתן להדגיש תאים לפי תנאי מסוים?", "answers": ["Pivot Table", "תבנית טקסט", "עיצוב מותנה", "הדפסת גיליון"], "correct": 3}, {"category": "אופיס", "difficulty": "בינוני", "text": "משתמש מדווח שרק מייל אחד תקוע ב-Outbox ושאר המיילים עובדים. מה סביר לבדוק קודם?", "answers": ["האם צורף קובץ גדול מדי", "האם המחשב במצב טיסה", "האם צריך לפרמט את המחשב", "האם צריך להחליף מסך"], "correct": 1}, {"category": "Troubleshooting", "difficulty": "בינוני", "text": "משתמש מתלונן שהמחשב איטי. מה הגישה הנכונה ביותר?", "answers": ["להפעיל מחדש בלבד ולסגור את הקריאה", "לבדוק מה בדיוק איטי, Task Manager, עומסי CPU/RAM ודיסק", "להחליף מחשב מיד", "להתקין Office מחדש"], "correct": 2}, {"category": "Troubleshooting", "difficulty": "בינוני", "text": "משתמש מקבל הודעה No Domain Controller Found. מה נכון לבדוק קודם?", "answers": ["להוציא ולהכניס לדומיין מיד", "לבדוק כבל רשת/חיבור רשת והגדרות IP/DNS", "למחוק את פרופיל המשתמש", "להחליף מקלדת"], "correct": 2}, {"category": "אבטחת מידע", "difficulty": "קל", "text": "מה חשוב לוודא בעת איפוס סיסמה למשתמש?", "answers": ["שהמשתמש נשמע לחוץ", "אימות זהות לפי נוהל ארגוני", "שהמשתמש זוכר את הסיסמה הישנה", "ששם המחשב מתחיל באות A"], "correct": 2}, {"category": "שירות לקוחות", "difficulty": "קל", "text": "משתמש מתוסכל פונה אליך בכעס עם תקלה חמורה. איך נכון להגיב?", "answers": ["להישאר רגוע, להקשיב, להרגיע ולהציע פתרון ראשוני", "להגיד לו להמתין עד שתתפנה", "לבקש ממנו לא לפנות שוב עד שיהיה פתרון", "לנתק את השיחה"], "correct": 1}, {"category": "Windows", "difficulty": "בינוני", "text": "מחשב מקבל כתובת 169.254.x.x. מה המשמעות הסבירה?", "answers": ["DHCP תקין", "אין קבלת כתובת משרת DHCP", "DNS עובד מהר מדי", "המשתמש נעול ב-AD"], "correct": 2}, {"category": "Windows", "difficulty": "בינוני", "text": "לאחר Login מופיע מסך שחור. מה כדאי לבדוק מוקדם?", "answers": ["האם explorer.exe רץ דרך Task Manager", "להחליף ספק כוח מיד", "להתקין מדפסת מחדש", "למחוק את כל הקבצים"], "correct": 1}, {"category": "Active Directory", "difficulty": "בינוני", "text": "משתמש ננעל כל כמה דקות. מה סיבה נפוצה?", "answers": ["סיסמה ישנה שמורה בטלפון/Outlook/שירות אחר", "מסך לא תקין", "חוסר מקום בסל המחזור", "כבל HDMI תקול"], "correct": 1}, {"category": "Active Directory", "difficulty": "קל", "text": "מה תפקיד Group Policy בארגון?", "answers": ["ניהול מרכזי של הגדרות והרשאות תחנות/משתמשים", "בדיקת מהירות דיסק בלבד", "החלפת אנטי וירוס", "שמירת קבצי PST"], "correct": 1}, {"category": "Microsoft 365", "difficulty": "בינוני", "text": "לאחר איפוס סיסמה משתמש לא מצליח להתחבר ל-365. מה חשוב לבדוק?", "answers": ["MFA / שיטות אימות", "צבע האייקון של Teams", "סוג העכבר", "רזולוציית המסך"], "correct": 1}, {"category": "Networking", "difficulty": "קל", "text": "מהו הפורט הסטנדרטי של HTTPS?", "answers": ["21", "25", "80", "443"], "correct": 4}, {"category": "Networking", "difficulty": "קל", "text": "מה תפקיד Default Gateway?", "answers": ["יציאה מרשת מקומית לרשתות אחרות", "שמירת סיסמאות", "ניהול מדפסות בלבד", "המרת קבצי Word"], "correct": 1}, {"category": "Office", "difficulty": "בינוני", "text": "מהו קובץ OST ב-Outlook?", "answers": ["עותק מקומי מסונכרן של תיבת הדואר", "קובץ BIOS", "קובץ התקנה של Windows", "טבלת Excel"], "correct": 1}, {"category": "Helpdesk", "difficulty": "קל", "text": "מה חשוב לעשות לפני סגירת קריאה?", "answers": ["לוודא מול המשתמש שהתקלה נפתרה ולתעד פתרון", "לסגור מיד כדי לשפר SLA", "למחוק את היסטוריית הקריאה", "להעביר למחלקה אחרת בלי סיבה"], "correct": 1}];
var questions=[];var current=0;var userAnswers=[];var questionSeconds=60;var secondsLeft=60;var timer=null;var startTime=null;var endedByTime='לא';
function el(id){return document.getElementById(id)}function show(id){['startScreen','examScreen','resultScreen'].forEach(function(x){el(x).classList.add('hidden')});el(id).classList.remove('hidden')}function fmt(s){return '00:'+String(s).padStart(2,'0')}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function prepareQuestions(list){questions=shuffle(list.slice()).slice(0,25).map(function(q){var arr=q.answers.map(function(a,i){return {text:a,ok:i===q.correct}});shuffle(arr);return {id:q.id,category:q.category,difficulty:q.difficulty,text:q.text,answers:arr.map(x=>x.text),correct:arr.findIndex(x=>x.ok)}});el('questionCountDisplay').textContent=questions.length;el('timeLimitDisplay').textContent=questions.length+' דקות';el('loadMsg').textContent='השאלות נטענו בהצלחה.';el('startBtn').disabled=false}
window.examQuestionsLoaded=function(data){prepareQuestions(data&&data.length?data:fallbackQuestions)};
function loadQuestions(){el('startBtn').disabled=true;if(APPS_SCRIPT_URL.indexOf('PASTE_')===0){prepareQuestions(fallbackQuestions);el('loadMsg').textContent='מצב בדיקה: השאלות נטענות מהקובץ. יש להדביק Apps Script URL כדי לעבוד מול Google Sheets.';return}var s=document.createElement('script');s.src=APPS_SCRIPT_URL+'?action=questions&callback=examQuestionsLoaded&v='+(Date.now());s.onerror=function(){prepareQuestions(fallbackQuestions);el('loadMsg').textContent='לא נטענו שאלות מהגיליון, נטענה גרסת גיבוי.'};document.body.appendChild(s)}
function render(){var q=questions[current];secondsLeft=questionSeconds;clearInterval(timer);el('timer').classList.remove('danger');el('questionTitle').textContent='שאלה '+(current+1);el('category').textContent=q.category+' | '+(q.difficulty||'');el('counter').textContent=(current+1)+' / '+questions.length;el('progressBar').style.width=((current+1)/questions.length*100)+'%';el('questionText').textContent=q.text;el('answers').innerHTML='';q.answers.forEach(function(a,i){var b=document.createElement('button');b.type='button';b.className='answer';b.innerHTML='<span class="dot"></span><span></span>';b.querySelector('span:last-child').textContent=a;b.onclick=function(){userAnswers[current]=i;Array.from(document.querySelectorAll('.answer')).forEach(x=>x.classList.remove('selected'));b.classList.add('selected')};el('answers').appendChild(b)});tick();timer=setInterval(tick,1000)}
function tick(){el('timer').textContent=fmt(secondsLeft);if(secondsLeft<=15)el('timer').classList.add('danger');if(secondsLeft<=0){endedByTime='כן';next();return}secondsLeft--}
function startExam(){if(!el('candidateName').value.trim()){alert('נא להזין שם מלא');return}current=0;userAnswers=Array(questions.length).fill(null);startTime=Date.now();show('examScreen');render()}
function next(){clearInterval(timer);if(current>=questions.length-1){finish()}else{current++;render()}}
function finish(){clearInterval(timer);var correct=0;var grouped={};questions.forEach(function(q,i){if(userAnswers[i]===q.correct)correct++;grouped[q.category]=grouped[q.category]||{total:0,correct:0};grouped[q.category].total++;if(userAnswers[i]===q.correct)grouped[q.category].correct++});var categoryScores={};Object.keys(grouped).forEach(function(k){var d=grouped[k];categoryScores[k]=Math.round(d.correct/d.total*100)+'% ('+d.correct+'/'+d.total+')'});var payload={candidateName:el('candidateName').value.trim(),phone:el('phone').value.trim(),email:el('email').value.trim(),position:el('position').value,score:Math.round(correct/questions.length*100),correct:correct,total:questions.length,durationSeconds:Math.round((Date.now()-startTime)/1000),endedByTime:endedByTime,categoryScores:categoryScores,answers:questions.map(function(q,i){return {number:i+1,category:q.category,question:q.text,selected:userAnswers[i]===null?'לא נבחרה תשובה':q.answers[userAnswers[i]],correctAnswer:q.answers[q.correct],isCorrect:userAnswers[i]===q.correct?'כן':'לא'}})};show('resultScreen');el('resultName').textContent='תודה, '+payload.candidateName+'.';if(APPS_SCRIPT_URL.indexOf('PASTE_')===0){el('submitStatus').textContent='חסר קישור Apps Script, התוצאות לא נשלחו.';return}fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(function(){el('submitStatus').textContent='התוצאות נשלחו לבוחן.'}).catch(function(){el('submitStatus').textContent='לא הצלחנו לשלוח את התוצאות. יש לפנות לבוחן.'})}
window.addEventListener('beforeunload',function(e){if(!el('examScreen').classList.contains('hidden')){e.preventDefault();e.returnValue=''}});document.addEventListener('DOMContentLoaded',function(){el('startBtn').onclick=startExam;el('nextBtn').onclick=next;loadQuestions()});
})();
</script></body></html>
