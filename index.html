<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>מבחן Helpdesk</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,"Segoe UI",sans-serif;background:#eef3f8;color:#172033}.app{width:min(940px,94vw);margin:35px auto}.card{background:white;border:1px solid #dbe3ef;border-radius:24px;padding:30px;box-shadow:0 20px 50px rgba(21,101,192,.12)}.hidden{display:none!important}.brand{display:flex;gap:18px;align-items:center;margin-bottom:22px}.logo{width:70px;height:70px;border-radius:18px;background:#1565c0;color:white;display:grid;place-items:center;font-weight:900;font-size:28px}h1,h2,p{margin-top:0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.grid.one{grid-template-columns:1fr}label{display:grid;gap:7px;font-weight:700;color:#64748b}input,select{border:1px solid #dbe3ef;border-radius:14px;padding:13px 15px;font-size:17px}.info{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:22px 0}.info div{background:#f8fbff;border:1px solid #dbe3ef;border-radius:16px;padding:16px}.info strong{display:block;font-size:22px}button{border:0;border-radius:14px;padding:14px 22px;font-size:17px;cursor:pointer;font-weight:800}.primary{background:#1565c0;color:white}.primary:disabled{opacity:.55;cursor:not-allowed}.exam-header{display:flex;justify-content:space-between;gap:20px}.timer{direction:ltr;font-size:28px;font-weight:900;color:#0d47a1;background:#edf3fb;padding:8px 14px;border-radius:14px}.danger{color:#c62828;background:#fff2f2}.muted{color:#64748b;font-weight:700}.progress{height:10px;background:#e8eef7;border-radius:999px;overflow:hidden;margin:20px 0 28px}#progressBar{height:100%;background:#1565c0;width:0}.question{font-size:24px;line-height:1.55;font-weight:900}.answers{display:grid;gap:12px}.answer{width:100%;display:flex;gap:12px;align-items:center;border:1px solid #dbe3ef;padding:16px;border-radius:16px;background:white;text-align:right;color:#172033}.answer.selected{border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,.12)}.dot{width:20px;height:20px;border:2px solid #dbe3ef;border-radius:50%;flex:0 0 20px}.selected .dot{background:#1565c0;border-color:#1565c0;box-shadow:inset 0 0 0 5px white}.nav{display:flex;justify-content:flex-end;margin-top:25px}#loadMsg{color:#64748b;font-weight:700;margin-top:12px}@media(max-width:700px){.grid,.info{grid-template-columns:1fr}.card{padding:20px}.exam-header{display:block}}
.security-warning{position:fixed;inset:0;background:rgba(15,23,42,.55);display:grid;place-items:center;z-index:9999}.security-warning>div{background:white;border-radius:22px;max-width:520px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.22);text-align:center}.security-warning h3{margin-top:0;color:#b42318}.security-warning button{margin-top:12px}</style></head><body><main class="app">
<section id="startScreen" class="card"><div class="brand"><div class="logo">IT</div><div><h1>מבחן מקצועי - Helpdesk</h1><p class="muted">30 שניות לכל שאלה. אין חזרה לשאלה קודמת. אין לעבור חלון בזמן המבחן.</p></div></div>
<div class="grid one"><label>שם מלא<input id="candidateName" required></label></div>
<div class="info"><div><strong id="questionCountDisplay">25</strong><span>שאלות</span></div><div><strong>30 שניות</strong><span>לכל שאלה</span></div><div><strong id="timeLimitDisplay">25 דקות</strong><span>סה״כ משוער</span></div></div>
<button id="startBtn" class="primary" type="button">התחל מבחן</button><div id="loadMsg">טוען שאלות...</div></section>
<section id="examScreen" class="card hidden"><header class="exam-header"><div><h2 id="questionTitle"></h2><p id="category" class="muted"></p></div><div><div class="timer" id="timer">01:00</div><div class="muted" id="counter"></div></div></header><div class="progress"><div id="progressBar"></div></div><p id="questionText" class="question"></p><div id="answers" class="answers"></div><footer class="nav"><button id="nextBtn" class="primary" type="button">הבא</button></footer></section>
<section id="resultScreen" class="card hidden"><h2>תודה על השתתפותך במבחן!</h2><p>המבחן התקבל בהצלחה.</p><p>אם תימצא מתאים, ניצור איתך קשר להמשך התהליך.</p><p id="resultName" style="display:none"></p><p id="submitStatus" style="display:none"></p></section>
</main><script>
(function(){'use strict';
var APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbyv54MExVYvFDwgyf2nXbyAisDNLT1XPI-pzHAy1Aw_-RL8LOg0qQpcmzhIpe_3UHYnxQ/exec';
var QUESTION_COUNT=25, SECONDS_PER_QUESTION=30;
var CATEGORY_QUOTAS={'Hardware':3,'Windows':3,'Networking':4,'Active Directory':2,'Microsoft 365':3,'Outlook':2,'Office':2,'Security':2,'Troubleshooting':3,'Printers':1,'Mobile':1,'Customer Service':2};
var DIFFICULTY_TARGET={'קל':8,'Easy':8,'בינוני':12,'Medium':12,'קשה':5,'Hard':5};
var fallbackQuestions=[]; var questions=[];var current=0;var userAnswers=[];var secondsLeft=30;var timer=null;var startTime=null;var endedByTime='לא';var suspiciousEvents=[];var focusLossCount=0;var warningCount=0;
function el(id){return document.getElementById(id)}function show(id){['startScreen','examScreen','resultScreen'].forEach(function(x){el(x).classList.add('hidden')});el(id).classList.remove('hidden')}function fmt(s){return '00:'+String(s).padStart(2,'0')}
function rand(){var a=new Uint32Array(1); if(window.crypto&&crypto.getRandomValues){crypto.getRandomValues(a); return a[0]/4294967296} return Math.random()}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(rand()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function normCat(c){c=(c||'').trim();var m={'חומרה':'Hardware','רשתות':'Networking','אופיס':'Office','שירות לקוחות':'Customer Service','Helpdesk':'Troubleshooting'};return m[c]||c}
function normTopic(t,q){return String(t||q||'').trim().toLowerCase().replace(/[\s\-_/]+/g,' ').slice(0,80)}
function parseQuestion(raw,idx){
  var text=raw.Question||raw.question||raw.text||'';
  var ans=[raw.Answer1,raw.Answer2,raw.Answer3,raw.Answer4].filter(Boolean);
  if(!ans.length&&Array.isArray(raw.answers)) ans=raw.answers;
  var correct=raw.Correct||raw.correct||1;
  var ci=parseInt(correct,10);
  if(isNaN(ci)) ci=ans.findIndex(function(x){return String(x).trim()===String(correct).trim()})+1;
  ci=Math.max(1,Math.min(ans.length,ci))-1;
  return {id:raw.ID||raw.id||idx+1,category:normCat(raw.Category||raw.category),topic:normTopic(raw.Topic||raw.topic,text),difficulty:raw.Difficulty||raw.difficulty||'',text:text,answers:ans,correct:ci,active:String(raw.Active||raw.active||'כן').trim()};
}
function selectBalanced(pool){pool=pool.filter(function(q){return q.text&&String(q.text).trim().length>8&&q.answers&&q.answers.length>=4&&q.active!=='לא'&&q.active.toLowerCase()!=='false'}); shuffle(pool); var selected=[], usedTopic={}, counts={}, diffCounts={}; function canUse(q,strict){if(usedTopic[q.topic])return false; if(strict&&CATEGORY_QUOTAS[q.category]&&counts[q.category]>=CATEGORY_QUOTAS[q.category])return false; return true} function add(q){selected.push(q); usedTopic[q.topic]=true; counts[q.category]=(counts[q.category]||0)+1; diffCounts[q.difficulty]=(diffCounts[q.difficulty]||0)+1}
 Object.keys(CATEGORY_QUOTAS).forEach(function(cat){var list=shuffle(pool.filter(function(q){return q.category===cat})); for(var i=0;i<list.length&&selected.length<QUESTION_COUNT;i++){if((counts[cat]||0)>=CATEGORY_QUOTAS[cat])break; if(canUse(list[i],false))add(list[i]);}});
 shuffle(pool).forEach(function(q){if(selected.length<QUESTION_COUNT&&canUse(q,true))add(q)});
 shuffle(pool).forEach(function(q){if(selected.length<QUESTION_COUNT&&!selected.some(function(s){return s.id===q.id}))add(q)});
 return shuffle(selected).slice(0,QUESTION_COUNT);}
function prepareQuestions(data){var parsed=(data||[]).map(parseQuestion); var chosen=selectBalanced(parsed.length?parsed:fallbackQuestions); questions=chosen.map(function(q){var arr=q.answers.map(function(a,i){return {text:a,ok:i===q.correct}});shuffle(arr);return {id:q.id,category:q.category,topic:q.topic,difficulty:q.difficulty,text:q.text,answers:arr.map(function(x){return x.text}),correct:arr.findIndex(function(x){return x.ok})}});el('questionCountDisplay').textContent=questions.length;el('timeLimitDisplay').textContent=Math.ceil(questions.length*SECONDS_PER_QUESTION/60)+' דקות';el('loadMsg').textContent='השאלות נטענו בהצלחה. נבחר מבחן מעורבב ומאוזן.';el('startBtn').disabled=false}
window.examQuestionsLoaded=function(data){prepareQuestions(data)};
function loadQuestions(){el('startBtn').disabled=true;var s=document.createElement('script');s.src=APPS_SCRIPT_URL+'?action=questions&callback=examQuestionsLoaded&v='+(Date.now());s.onerror=function(){el('loadMsg').textContent='לא נטענו שאלות מהגיליון. בדוק Apps Script ו-Questions.';el('startBtn').disabled=true};document.body.appendChild(s)}
function render(){var q=questions[current];secondsLeft=SECONDS_PER_QUESTION;clearInterval(timer);el('timer').classList.remove('danger');el('questionTitle').textContent='שאלה '+(current+1);el('category').textContent=q.category+' | '+(q.difficulty||'');el('counter').textContent=(current+1)+' / '+questions.length;el('progressBar').style.width=((current+1)/questions.length*100)+'%';el('questionText').textContent=q.text;el('answers').innerHTML='';q.answers.forEach(function(a,i){var b=document.createElement('button');b.type='button';b.className='answer';b.innerHTML='<span class="dot"></span><span></span>';b.querySelector('span:last-child').textContent=a;b.onclick=function(){userAnswers[current]=i;Array.from(document.querySelectorAll('.answer')).forEach(function(x){x.classList.remove('selected')});b.classList.add('selected')};el('answers').appendChild(b)});tick();timer=setInterval(tick,1000)}
function tick(){el('timer').textContent=fmt(secondsLeft);if(secondsLeft<=15)el('timer').classList.add('danger');if(secondsLeft<=0){endedByTime='כן';next();return}secondsLeft--}
function startExam(){if(!el('candidateName').value.trim()){alert('נא להזין שם מלא');return}if(!questions.length){alert('השאלות עדיין לא נטענו');return}current=0;userAnswers=Array(questions.length).fill(null);startTime=Date.now();show('examScreen');render()}
function next(){clearInterval(timer);if(current>=questions.length-1){finish()}else{current++;render()}}
function finish(){clearInterval(timer);var correct=0, grouped={};questions.forEach(function(q,i){var ok=userAnswers[i]===q.correct;if(ok)correct++;grouped[q.category]=grouped[q.category]||{total:0,correct:0};grouped[q.category].total++;if(ok)grouped[q.category].correct++});var categoryScores={};Object.keys(grouped).forEach(function(k){var d=grouped[k];categoryScores[k]=Math.round(d.correct/d.total*100)+'% ('+d.correct+'/'+d.total+')'});var payload={candidateName:el('candidateName').value.trim(),phone:'',email:'',position:'Helpdesk',focusLossCount:focusLossCount,warningCount:warningCount,suspiciousEvents:suspiciousEvents,score:Math.round(correct/questions.length*100),correct:correct,total:questions.length,durationSeconds:Math.round((Date.now()-startTime)/1000),endedByTime:endedByTime,categoryScores:categoryScores,answers:questions.map(function(q,i){return {number:i+1,category:q.category,topic:q.topic,difficulty:q.difficulty,question:q.text,selected:userAnswers[i]===null?'לא נבחרה תשובה':q.answers[userAnswers[i]],correctAnswer:q.answers[q.correct],isCorrect:userAnswers[i]===q.correct?'כן':'לא'}})};show('resultScreen');fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).catch(function(){})}

function logSecurityEvent(type){
  var ev={time:new Date().toISOString(),question:current+1,type:type};
  suspiciousEvents.push(ev); warningCount++;
  showSecurityWarning(type);
}
function showSecurityWarning(type){
  var old=document.getElementById('securityWarning'); if(old) old.remove();
  var box=document.createElement('div'); box.id='securityWarning'; box.className='security-warning';
  box.innerHTML='<div><h3>אזהרת אבטחת מבחן</h3><p>זוהתה פעולה שאינה מותרת בזמן מבחן: '+type+'</p><p class="muted">האירוע נרשם ויישלח לבוחן יחד עם התוצאות.</p><button class="primary" type="button">הבנתי, המשך מבחן</button></div>';
  box.querySelector('button').onclick=function(){box.remove();};
  document.body.appendChild(box);
}
document.addEventListener('visibilitychange',function(){if(!el('examScreen').classList.contains('hidden')&&document.hidden){focusLossCount++;logSecurityEvent('מעבר חלון / יציאה מטאב')}});
window.addEventListener('blur',function(){if(!el('examScreen').classList.contains('hidden')){focusLossCount++;suspiciousEvents.push({time:new Date().toISOString(),question:current+1,type:'חלון איבד פוקוס'});}});
document.addEventListener('keydown',function(e){
  if(el('examScreen').classList.contains('hidden')) return;
  var k=e.key;
  var blocked=(k==='PrintScreen')||(e.ctrlKey&&['p','s','c','u'].includes(k.toLowerCase()))||(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(k.toLowerCase()))||(k==='F12');
  if(blocked){e.preventDefault();logSecurityEvent('ניסיון צילום/העתקה/כלי מפתחים');}
});
document.addEventListener('contextmenu',function(e){if(!el('examScreen').classList.contains('hidden')){e.preventDefault();logSecurityEvent('קליק ימני');}});

window.addEventListener('beforeunload',function(e){if(!el('examScreen').classList.contains('hidden')){e.preventDefault();e.returnValue=''}});document.addEventListener('DOMContentLoaded',function(){el('startBtn').onclick=startExam;el('nextBtn').onclick=next;loadQuestions()});
})();
</script></body></html>
